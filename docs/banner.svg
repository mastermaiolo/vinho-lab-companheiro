<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Vinho-Lab Companheiro">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0808"/>
      <stop offset="0.5" stop-color="#4a0e0e"/>
      <stop offset="1" stop-color="#6b1414"/>
    </linearGradient>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a01b1b"/>
      <stop offset="1" stop-color="#5e0d0d"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect width="1200" height="340" rx="18" fill="url(#bg)"/>

  <!-- vinha decorativa subtil -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2">
    <circle cx="120" cy="60" r="40"/>
    <circle cx="1140" cy="300" r="60"/>
    <circle cx="1080" cy="40" r="26"/>
  </g>

  <!-- taça de vinho -->
  <g transform="translate(960,60)" stroke="#f3dede" stroke-opacity="0.9" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- vinho dentro da taça -->
    <path d="M48,38 C48,108 132,108 132,38 Z" fill="url(#wine)" stroke="none"/>
    <!-- contorno da taça -->
    <path d="M44,30 C44,108 136,108 136,30"/>
    <ellipse cx="90" cy="30" rx="46" ry="12"/>
    <!-- haste -->
    <line x1="90" y1="112" x2="90" y2="186"/>
    <!-- base -->
    <ellipse cx="90" cy="190" rx="44" ry="10"/>
  </g>

  <!-- título -->
  <text x="80" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#ffffff">Vinho-Lab Companheiro</text>

  <!-- subtítulo -->
  <text x="82" y="208" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" fill="#f0d9d9">Validação regulamentar de vinho — Brasil (MAPA) &#8596; Portugal / UE (IVV)</text>

  <!-- linha de atributos -->
  <text x="82" y="256" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#d6a3a3" letter-spacing="0.5">100&#37; no navegador&#160;&#160;·&#160;&#160;sem servidor&#160;&#160;·&#160;&#160;coerente com o RGPD&#160;&#160;·&#160;&#160;PT · EN · ES · 中文</text>

  <!-- veredito de exportabilidade (chip) -->
  <g transform="translate(82,286)">
    <rect width="220" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" stroke="#f3dede" stroke-opacity="0.25"/>
    <text x="20" y="23" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#f3dede">veredito de exportabilidade</text>
  </g>
</svg>
