<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Vinho Lab Comp">
  <defs>
    <!-- Gradiente de fundo de vinho envelhecido escuro -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a070d"/>
      <stop offset="60%" stop-color="#0a0305"/>
      <stop offset="100%" stop-color="#040102"/>
    </linearGradient>
    <!-- Gradiente do líquido do vinho -->
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ad283b"/>
      <stop offset="100%" stop-color="#5c0612"/>
    </linearGradient>
    <!-- Gradiente para o título principal -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d6da"/>
      <stop offset="100%" stop-color="#df9ba6"/>
    </linearGradient>
    <!-- Filtro de desfoque para brilho/glow de fundo -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="50" result="blur" />
    </filter>
  </defs>

  <!-- Fundo com borda sutil de vidro -->
  <rect width="1200" height="340" rx="20" fill="url(#bg)" stroke="rgba(229, 179, 187, 0.08)" stroke-width="2"/>

  <!-- Brilho suave cor de vinho ao fundo da taça -->
  <circle cx="980" cy="170" r="160" fill="#8b1c2b" opacity="0.18" filter="url(#glow)"/>

  <!-- Grelha sensorial circular sutil (estilo OIV / laboratório) -->
  <g fill="none" stroke="#f5d6da" stroke-opacity="0.03" stroke-width="1.5">
    <circle cx="980" cy="170" r="130"/>
    <circle cx="980" cy="170" r="90"/>
    <circle cx="980" cy="170" r="50"/>
    <line x1="980" y1="20" x2="980" y2="320"/>
    <line x1="830" y1="170" x2="1130" y2="170"/>
  </g>

  <!-- Taça de vinho minimalista de cristal -->
  <g transform="translate(890, 70)" stroke="#f5d6da" stroke-opacity="0.8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vinho dentro da taça -->
    <path d="M48,38 C48,108 132,108 132,38 Z" fill="url(#wine)" stroke="none"/>
    <!-- Contorno da taça -->
    <path d="M44,30 C44,108 136,108 136,30" stroke-width="2.5"/>
    <ellipse cx="90" cy="30" rx="46" ry="10" stroke-opacity="0.35" stroke-width="2"/>
    <!-- Haste da taça -->
    <line x1="90" y1="112" x2="90" y2="182" stroke-width="2.5"/>
    <!-- Base da taça -->
    <ellipse cx="90" cy="186" rx="42" ry="9" stroke-opacity="0.7"/>
    <!-- Brilho reflexivo no cristal -->
    <path d="M54,42 C54,72 68,92 90,92" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <!-- Título principal emparelhado -->
  <text x="80" y="132" font-family="'Playfair Display', Georgia, serif" font-size="62" font-weight="800" fill="url(#titleGrad)" letter-spacing="0.5">Vinho Lab Comp</text>

  <!-- Subtítulos descritivos -->
  <text x="82" y="185" font-family="'Geist Sans', Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#f6edf0">Validação regulamentar de vinhos</text>
  <text x="82" y="215" font-family="'Geist Sans', Inter, system-ui, sans-serif" font-size="16" font-weight="400" fill="#a38c90">Análise e equivalências físico-químicas: Brasil (MAPA) · Portugal / UE (IVV)</text>

  <!-- Linha de atributos técnicos -->
  <text x="82" y="258" font-family="'Geist Sans', Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#a38c90" fill-opacity="0.8" letter-spacing="0.5">100&#37; no navegador  ·  sem envio de dados  ·  RGPD  ·  PT · EN · ES · 中文</text>

  <!-- Veredito de exportabilidade (badge premium) -->
  <g transform="translate(82, 282)">
    <rect width="224" height="28" rx="14" fill="#8b1c2b" stroke="rgba(245, 214, 218, 0.12)" stroke-width="1"/>
    <text x="14" y="18" font-family="'Geist Sans', Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#f5d6da" letter-spacing="1">VEREDITO DE EXPORTABILIDADE</text>
  </g>
</svg>
